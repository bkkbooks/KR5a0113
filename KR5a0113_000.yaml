body:
  text: 張果先生注觀天之道執天之行盡矣觀自然之道無所觀也不觀之以目而觀之以心心深微而無所見故能照自然之性唯深微而能照其斯之謂陰執自然之行無所執也不執之以手而執之以機機變通而無所繫故能契自然之理其斯之謂符照之以心契之以機而陰符之義盡矣李筌以陰為暗以符為合以此文為序首何昧之至也故天有五賊見之者昌五賊者命物時功神也傳曰聖人之理圖大而不顧其細體瑜而不掩其瑕故居夷則導道布德以化之履險則用權發機以拯之務在匡天地謀在濟人倫於是用大義除天下之害用大仁興天下之利用至正措天下之枉用至公平天下之私故反經合道之謀其名有五聖人襌之乃謂之賊天下賴之則謂之德故賊天之命人知其天而不知其賊黃帝所以代炎帝也賊天之物人知其天而不知其賊帝堯所以代帝摯也賊天之時人知其天而不知其賊帝舜所以代帝堯也賊天之功人知其天而不知其賊大禹所以代帝舜也賊天之神人知其天而不知其賊殷湯所以革夏命也故見之者昌自然而昌也太公以賊命為用味以取其喻也李筌不悟以黃帝賊少女之命白日上騰為非也五賊在乎心施行乎天宇宙在乎手萬化生乎身傳曰其立德明機用妙發之於內見之於外而已豈稱兵革以作寇亂哉見其機而執之雖宇宙之大不離乎掌領況其小者乎知其神而體之雖萬物之衆不能出其胸臆況其寡者乎自然造化之力而我有之不亦盛乎不亦大乎李筌等以五賊為五味順之則可以神仙不死誣道之甚也天性人也人心機也立天之道以定人也傳曰人謂天性機為人心人性本自玄合故聖人能體五賊也天發殺機龍蛇起陸人發殺機天地反覆傳曰天機張而不生天機弛而不死天有弛張用有否臧張則殺威行弛則殺威亡天殺之機息然天以氣為威人以德為機秋冬陰氣嚴凝天之張殺機也故龍蛇畏而蟄伏冬謝春來陰退陽長天之弛殺也故龍蛇悅而振起天亦有寒暄德亦有寒暄人亦有寒暄德刑總肅君之張殺機也故臣下畏而服從德失刑偏君之弛殺機也故姦雄悅而馳騁位有尊卑如人有天地故曰天發殺機龍蛇起陸寇亂所由作人發殺機天地反覆尊卑猶是革太公諸葛亮等以殺人過萬大風暴起晝若暝以為天地反覆其失甚矣天人合發萬變定基傳曰天以禍福之機運於上君以利害之機動於下故有德者萬變而愈盛以至於王無德者萬化而愈衰以至於亡萬變定基自然而定性有巧拙可以伏藏傳曰聖人之性巧於用居窮行險則謀道以濟之對强與明則行義以退避之理國必以是行師亦以是九竅之邪在乎三要可以動靜傳曰九竅之用三要為機三要者機情性也機之則無不安倩之則無不邪性之則無不正故聖人動以伏其倩靜以常其性樂以定其機小人則反此故下文云太公以三要為耳目口李筌為心神息皆忘機也俱失陰符之正意火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人傳曰夫木情靜動而生火不覺火盛而焚其質由人之性靜動而生姦不覺姦成而亂其國夫明者見彼之隙以設其機智者知彼之病以圖其利則夭下之人彼愚而我聖是謂生者自謂得其生死者自謂得其死無不謂得道之理也天生天殺道之理也天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安傳曰天地以陰陽之氣化萬物萬物不知其盜萬物以美惡之味饗人人不知其盜人以利害之謀制萬物萬物不知其盜三盜玄合於人心三才順動於天理有若時然後食終身無不愈時然後動庶績無不安食不得其時動不得其機殆至滅亡故曰食其時百骸治動其機萬化安人知其神而神不知其不神所以神也傳曰時人不知盜之為盜只謂神之能神鬼谷子曰彼此不覺之謂神蓋用微之功著矣李筌不知此文意通三靈别以聖人愚人為喻何甚失也日月有數大小有定聖功生焉神明出焉傳曰日月有准運數也大小有定君臣也觀天之時察人之事執人之機如是則聖得以功神得以明心宜理合安之善也筌以度數為日月以餘分為大小以神氣能生聖功神明錯謬之甚也其盜機也天下莫能見莫能知也君子得之固躬小人得之輕命傳曰其盜微而動所施甚明慱所行極玄妙君子用之達則兼濟天下太公其人也窮則獨善其一身夫子其人也豈非擇利之能審小人用之則失其身大夫種之謂歟得利而亡義李斯之謂歟豈非信道之不篤焉瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍傳曰瞽者善於聽忘色審聲所以致其聽聾者善於視遺耳專目所以致其明故能十衆之功一晝之中三而行之所以至也一夜之中三而息之所以精也故能用萬衆之人筌不知師是衆以為兵師誤也心生於物死於物機在於目傳曰夫心有愛惡之情物有否臧之用目視而察之於外心應而度之於內善則從而行之否則達而止之所以觀善而懲惡也筌以項羽其目機心生於物以符堅見機心死於物殊不知有否臧之用天之無恩而大恩生迅雷烈風莫不蠢然傳曰夭以凶象咎徵見人能警戒以修德以迅雷烈風動人之恐懼以致福無恩而生大恩之謂也李筌以天地不仁為大恩以萬物歸於天為蠢然與陰符本意殊背至樂性餘至靜性廉傳曰未發謂之中守中謂之常别樂得其志而性有餘矣安常謂之自足則靜其志而廉常足矣筌以奢為樂性以廉為靜殊乖至道之意天之至私用之至公傳曰自然之理微而不可知私之至也自然之效明而不可違公之至也體聖體之亦然筌引孫子云視卒如愛子可以之俱死何也擒之制在氣傳曰擒物之以氣制之以機豈大小之才乎太公曰豈以小大而相制哉筌不知擒義誤以禽獸注解引云玄龜食蟒黃腰啖虎之類為是悲哉生者死之根死者生之根恩生於害害生於恩生者人之所愛厚於身大過則道喪而死自來矣死者人之所惡於事至明則道在而生自圖矣福理所及謂之恩禍亂所及謂之害損己則為物之所益害之生恩也筌引孫子用兵為生死丁公管仲為恩害異哉愚人以天地文理聖我以時物文理哲人以虞愚我以不愚聖人以其期聖我以不期其聖傳曰觀夭之運四時察地之化萬物無所不知而蔽之以無知小恩於人以蒙自養之謂也知四時之行知萬物之生皆自然也故聖人於我以中自居之謂也故曰死生在我而已矣人之死亡譬如沉水自溺投火自焚自取滅亡理國以道在於損其事而已理軍以權在於亡其兵而已無死機則不死鬼神其如我何天生機則不生天地其如我何聖人修身以安其家理國以平天下在乎立生機以自去其死性者生之機也除死機以自取其生情者死之機也筌不瞭夭道以愚人聖人體道愚昧之人而驗天道失之甚也故曰沉水入火自取滅亡注在上文自然之道靜故天地萬物生傳曰自然之道無為而無不為動靜皆得其性靖之至也靖故能立天地生萬物自然而然也伊尹曰靖之至不知所以生也天地之道浸故陰陽勝傳曰浸微也天地之道體著而用微變通莫不歸於正微之漸故能分陰陽成四時之至順也陰陽相推而變化順矣傳曰聖人變化順陰陽之機天地之位自然故因自然而冥之利自然而用之莫不得自然之道也是故聖人知自然之道不可違因而制之注在上文至靜之道律曆所不能契傳曰道之至靜也律曆因而制之不能叶其中鳥獸居之謂也爰有竒器是生萬象八卦甲子神機鬼藏傳曰人卦變異之伎從是而生上則萬象下則萬機用八卦而體天用九疇而法地參之以氣候貫之以甲子達之以神機閉之以詭藏奇譎之蕩自然也陰陽相勝之術昭昭乎進乎象矣傳曰陰陽相勝之術坦微而不違乎本明之信可明故能進乎精曜象矣黃帝陰符經注終
