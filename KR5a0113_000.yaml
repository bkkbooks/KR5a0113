front:
  text: 黃帝陰符經注並序閏五陰符自黃帝有之蓋聖人體天用道之機也經曰得機者萬變而愈盛以至於王失機者萬變而愈衰以至於亡厥後伊吕得其末分猶足以拯生靈況聖人乎其文簡其義玄凡有先聖數家注解互相隱顯後學難精雖有所主者若登天無階耳近代李筌假託妖巫妄為注述徒參人事殊紊至源不慚窺管之微輒呈酌海之見使小人竊窺自謂得天機也悲哉臣固愚昧嘗謂不然朝願聞道夕死無悔偶於道經藏中得陰符傳不知何代人製詞理玄邈如契自然臣遂編之附而入注冀將來之君子不失道㫖矣黃帝陰符經注
  hash: sha256:4c11cdcd1fda545cda7f71efb6138703093d8fc59185a24b9538a2c3ad54007a
